services:
  - type: web
    name: simple-node-proxy
    env: node
    buildCommand: "npm ci"
    startCommand: "node index.js"
    nodeVersion: 22
    envVars:
      - key: POLL_INTERVAL_MS
        value: "30000"
      - key: BASELINE_REFRESH_MS
        value: "300000"
      - key: ENABLE_CHANGE_DETECTION
        value: "true"